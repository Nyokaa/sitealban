name: Déploiement GitHub Pages

on:
  # Déploie automatiquement à chaque push sur main.
  push:
    branches: [main]
  # Permet aussi un déclenchement manuel depuis l'onglet Actions.
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Installation des dépendances
        run: npm ci

      - name: Build (export statique)
        run: npm run build

      - name: Désactivation de Jekyll
        run: touch ./out/.nojekyll

      - name: Envoi de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
